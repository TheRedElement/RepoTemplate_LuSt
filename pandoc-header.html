<style>
/* Images */
img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* Tables */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
}

/* Improve readability */
body {
  max-width: 900px;
  margin: auto;
  font-family: sans-serif;
  line-height: 1.5;
  background-color: #000000;
  color: #ffffff;
}
</style>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(','\\)'], ['$', '$']],
    displayMath: [['$$','$$']]
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

<!-- Mermaid -->
<script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

</script>
